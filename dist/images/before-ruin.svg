<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Photographic abandoned stone ruin in a remote Italian countryside landscape before restoration">
  <!-- Photo source: https://unsplash.com/photos/ruins-of-an-old-stone-building-at-sunset-NblmfWFSq_k by Peppe Occhipinti; loaded remotely to keep the PR text-only/no binary assets. -->
  <defs>
    <clipPath id="frame"><rect width="1600" height="1000" rx="0"/></clipPath>
    <linearGradient id="grade" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050504" stop-opacity="0.38"/>
      <stop offset="0.38" stop-color="#2f1d12" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#050504" stop-opacity="0.58"/>
    </linearGradient>
    <radialGradient id="warm" cx="70%" cy="24%" r="55%">
      <stop stop-color="#f3c77e" stop-opacity="0.3"/>
      <stop offset="0.42" stop-color="#a86d3e" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="21"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.13"/></feComponentTransfer>
    </filter>
  </defs>
  <g clip-path="url(#frame)">
    <image href="https://source.unsplash.com/NblmfWFSq_k/1600x1000" x="0" y="0" width="1600" height="1000" preserveAspectRatio="xMidYMid slice"/>
    <rect width="1600" height="1000" fill="#26170f" opacity="0.22"/>
    <rect width="1600" height="1000" fill="url(#warm)"/>
    <rect width="1600" height="1000" fill="url(#grade)"/>
    <rect width="1600" height="1000" filter="url(#grain)" opacity="0.9"/>
  </g>
</svg>
