<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Photographic restored stone countryside house in a mountainous landscape after intervention">
  <!-- Photo source: https://unsplash.com/photos/a-stone-house-with-mountains-in-the-background-6xdlgWyIFVU by Slim MARS; loaded remotely to keep the PR text-only/no binary assets. -->
  <defs>
    <clipPath id="frame"><rect width="1600" height="1000" rx="0"/></clipPath>
    <linearGradient id="grade" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050504" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#2f1d12" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#050504" stop-opacity="0.52"/>
    </linearGradient>
    <radialGradient id="warm" cx="68%" cy="26%" r="55%">
      <stop stop-color="#ffd88a" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#b47641" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" seed="27"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.11"/></feComponentTransfer>
    </filter>
  </defs>
  <g clip-path="url(#frame)">
    <image href="https://source.unsplash.com/6xdlgWyIFVU/1600x1000" x="0" y="0" width="1600" height="1000" preserveAspectRatio="xMidYMid slice"/>
    <rect width="1600" height="1000" fill="#2a180d" opacity="0.16"/>
    <rect width="1600" height="1000" fill="url(#warm)"/>
    <rect width="1600" height="1000" fill="url(#grade)"/>
    <rect width="1600" height="1000" filter="url(#grain)" opacity="0.85"/>
  </g>
</svg>
